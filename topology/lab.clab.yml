name: ai-mcp

topology:
  nodes:
    leaf1:
      kind: linux
      image: frrouting/frr:9.1.0

    leaf2:
      kind: linux
      image: frrouting/frr:9.1.0

    spine1:
      kind: linux
      image: frrouting/frr:9.1.0

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["leaf1:eth0", "leaf2:eth0"]
